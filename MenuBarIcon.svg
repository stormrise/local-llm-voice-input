<svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Menu Bar Icon: Minimalist microphone for macOS menu bar -->
  <!-- Black & red recording studio aesthetic -->

  <defs>
    <linearGradient id="micGrad" x1="9" y1="2" x2="9" y2="12" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#3a3a3a"/>
    </linearGradient>
    <linearGradient id="standGrad" x1="5" y1="9.5" x2="13" y2="14.5" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#2d2d2d"/>
    </linearGradient>
  </defs>

  <!-- Microphone body - rounded capsule -->
  <rect x="6.5" y="2" width="5" height="8" rx="2.5" fill="url(#micGrad)"/>

  <!-- Microphone accent dot -->
  <circle cx="9" cy="5" r="1" fill="#e53e3e"/>

  <!-- Microphone stand arc -->
  <path d="M5 9.5C5 9.5 5 12 9 12C13 12 13 9.5 13 9.5"
        stroke="url(#standGrad)" stroke-width="1.2" stroke-linecap="round" fill="none"/>

  <!-- Stand vertical line -->
  <line x1="9" y1="12" x2="9" y2="14.5" stroke="url(#standGrad)" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Stand base -->
  <line x1="7" y1="14.5" x2="11" y2="14.5" stroke="url(#standGrad)" stroke-width="1.2" stroke-linecap="round"/>
</svg>
